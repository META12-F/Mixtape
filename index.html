<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Karlita - Vol. 1</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            height: 100%;
            width: 100%;
            background-color: #121212;
            color: #fff;
            font-family: 'Space Mono', monospace;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* PANTALLA INICIAL PARA DESBLOQUEAR AUDIO */
        #start-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 50;
            transition: opacity 0.8s ease;
        }
        .btn-start {
            background: transparent;
            border: 2px solid #ff4757;
            color: #ff4757;
            padding: 15px 30px;
            font-family: 'Space Mono', monospace;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(255, 71, 87, 0.3);
            transition: all 0.3s;
        }
        .btn-start:active { background: rgba(255, 71, 87, 0.2); transform: scale(0.95); }

        /* CONTENEDOR PRINCIPAL */
        #app-container {
            width: 100%;
            max-width: 500px;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 1s ease 0.5s;
        }

        /* CASSETTE VINTAGE */
        .cassette {
            width: 300px;
            height: 190px;
            background: #2f3542;
            border-radius: 15px;
            border: 4px solid #57606f;
            position: relative;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5), inset 0 0 20px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            margin-bottom: 30px;
        }
        .cassette-label {
            width: 85%;
            height: 70px;
            background: #ff4757;
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Caveat', cursive;
            font-size: 24px;
            color: #fff;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
            margin-bottom: 15px;
        }
        .cassette-window {
            width: 60%;
            height: 50px;
            background: #1e272e;
            border: 3px solid #57606f;
            border-radius: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            position: relative;
        }
        /* La cinta del medio */
        .cassette-window::after {
            content: '';
            position: absolute;
            top: 50%; left: 10%; width: 80%; height: 2px;
            background: rgba(255,255,255,0.1);
            z-index: 1;
        }
        .reel {
            width: 35px;
            height: 35px;
            background: #dfe4ea;
            border-radius: 50%;
            border: 4px solid #2f3542;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
        }
        .reel-spokes {
            width: 100%; height: 100%;
            background-image: conic-gradient(#dfe4ea 0 30deg, #747d8c 30deg 60deg, #dfe4ea 60deg 90deg, #747d8c 90deg 120deg, #dfe4ea 120deg 150deg, #747d8c 150deg 180deg, #dfe4ea 180deg 210deg, #747d8c 210deg 240deg, #dfe4ea 240deg 270deg, #747d8c 270deg 300deg, #dfe4ea 300deg 330deg, #747d8c 330deg 360deg);
            border-radius: 50%;
        }
        .reel-hole {
            width: 12px; height: 12px;
            background: #1e272e;
            border-radius: 50%;
            position: absolute;
        }

        /* Animación de girar */
        .playing .reel-spokes {
            animation: spin 3s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* CONTROLES */
        .controls {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
        }
        .btn-control {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #2f3542;
            border: 2px solid #ff4757;
            color: #ff4757;
            font-size: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-control:active { transform: scale(0.9); background: #ff4757; color: #fff; }

        /* INFO TRACK */
        #track-info {
            text-align: center;
            margin-bottom: 30px;
            height: 40px;
        }
        #track-name { font-size: 14px; color: #ff4757; font-weight: bold; margin-bottom: 5px; }
        #track-status { font-size: 12px; color: #747d8c; }

        /* LIBRETA DIGITAL (Mensajes) */
        .notebook {
            width: 90%;
            background: #f1f2f6;
            color: #2f3542;
            padding: 25px;
            border-radius: 5px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            position: relative;
            transform: rotate(-2deg); /* Toque relajado */
        }
        /* Líneas de la libreta */
        .notebook::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: repeating-linear-gradient(transparent, transparent 24px, #dfe4ea 24px, #dfe4ea 25px);
            z-index: 0;
            pointer-events: none;
        }
        .note-text {
            position: relative;
            z-index: 1;
            font-family: 'Caveat', cursive;
            font-size: 22px;
            line-height: 25px;
            min-height: 100px;
            transition: opacity 0.5s;
        }
        .signature {
            text-align: right;
            margin-top: 15px;
            font-family: 'Caveat', cursive;
            font-weight: bold;
            color: #ff4757;
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>

    <audio id="audio-player" preload="auto"></audio>

    <div id="start-screen">
        <button class="btn-start" onclick="initSystem()">ABRIR PAQUETE 📦</button>
    </div>

    <div id="app-container">
        
        <div class="cassette" id="cassette-ui">
            <div class="cassette-label">Vol. 1: CUU ✈️ JRZ</div>
            <div class="cassette-window">
                <div class="reel"><div class="reel-spokes"></div><div class="reel-hole"></div></div>
                <div class="reel"><div class="reel-spokes"></div><div class="reel-hole"></div></div>
            </div>
        </div>

        <div id="track-info">
            <div id="track-name">Pista 1 lista</div>
            <div id="track-status">Cinta detenida</div>
        </div>

        <div class="controls">
            <button class="btn-control" id="btn-play" onclick="togglePlay()">▶</button>
            <button class="btn-control" id="btn-next" onclick="nextTrack()">⏭</button>
        </div>

        <div class="notebook">
            <div class="note-text" id="note-display">
                Aquí aparecerán mis notas...
            </div>
            <div class="signature">- David</div>
        </div>

    </div>

    <script>
        // CONFIGURACIÓN DE TUS 3 CANCIONES Y MENSAJES
        const playlist = [
            {
                file: "track1.mp3",
                title: "Track 1: La Conexión",
                message: "Dicen que de Chihuahua a Juárez son casi 4 horas de carretera... pero con la tecnología (y esta rola) la distancia se siente de un solo clic. Dale play a lo que empieza."
            },
            {
                file: "track2.mp3",
                title: "Track 2: Vibra Fronteriza",
                message: "Me encanta lo que estoy conociendo de ti, Karlita. Tienes una vibra y una sonrisa increíble. Ve guardándome una tarde de estas para cuando vaya a visitarte, ¿va?"
            },
            {
                file: "track3.mp3",
                title: "Track 3: El Cierre",
                message: "Sigue con tu día, rompiéndola como siempre siendo madre. Yo por acá sigo chambeando pero pensando en ti. Espero que este pequeño detalle te haya hecho sonreír hoy."
            }
        ];

        let currentTrack = 0;
        let isPlaying = false;

        const audioPlayer = document.getElementById('audio-player');
        const cassetteUI = document.getElementById('cassette-ui');
        const btnPlay = document.getElementById('btn-play');
        const trackName = document.getElementById('track-name');
        const trackStatus = document.getElementById('track-status');
        const noteDisplay = document.getElementById('note-display');
        const startScreen = document.getElementById('start-screen');
        const appContainer = document.getElementById('app-container');

        // Inicializa el sistema (Truco para móviles)
        function initSystem() {
            // Carga la primera canción
            loadTrack(currentTrack);
            
            // Truco de destrabe de iOS/Android
            audioPlayer.play().then(() => {
                audioPlayer.pause();
                audioPlayer.currentTime = 0;
            }).catch(e => console.log(e));

            // Quita la pantalla inicial
            startScreen.style.opacity = '0';
            setTimeout(() => {
                startScreen.style.display = 'none';
                appContainer.style.visibility = 'visible';
                appContainer.style.opacity = '1';
            }, 800);
        }

        // Cargar canción y mensaje en la interfaz
        function loadTrack(index) {
            audioPlayer.src = playlist[index].file;
            trackName.textContent = playlist[index].title;
            
            // Efecto de desvanecimiento para el texto de la libreta
            noteDisplay.style.opacity = 0;
            setTimeout(() => {
                noteDisplay.textContent = playlist[index].message;
                noteDisplay.style.opacity = 1;
            }, 300);
        }

        // Play / Pause
        function togglePlay() {
            if (isPlaying) {
                audioPlayer.pause();
                cassetteUI.classList.remove('playing');
                btnPlay.textContent = "▶";
                trackStatus.textContent = "Pausado";
            } else {
                audioPlayer.play();
                cassetteUI.classList.add('playing');
                btnPlay.textContent = "⏸"; // Ícono de pausa
                trackStatus.textContent = "Reproduciendo...";
            }
            isPlaying = !isPlaying;
        }

        // Siguiente Canción
        function nextTrack() {
            currentTrack++;
            if (currentTrack >= playlist.length) {
                currentTrack = 0; // Si llega a la 3, vuelve a la 1
            }
            
            // Pausa temporalmente mientras cambia
            isPlaying = false;
            cassetteUI.classList.remove('playing');
            
            loadTrack(currentTrack);
            
            // Auto play
            setTimeout(() => {
                togglePlay();
            }, 500);
        }

        // Cuando la canción termine, que pase a la siguiente automáticamente
        audioPlayer.addEventListener('ended', () => {
            nextTrack();
        });
    </script>
</body>
</html>
